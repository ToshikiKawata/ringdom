<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 不透明な背景（iOSはアルファ不可・OS側で角丸になるので角丸は焼き込まない） -->
  <rect width="1024" height="1024" fill="#071507"/>
  <!-- 微妙なグラデーションで奥行き -->
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#0d240d"/>
      <stop offset="100%" stop-color="#050d05"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#g)"/>
  <!-- ゴールドの枠（セーフゾーン内: 150〜874） -->
  <rect x="150" y="150" width="724" height="724" rx="52" fill="none" stroke="#c9a227" stroke-width="12"/>
  <!-- スペード -->
  <text x="512" y="500" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="300" fill="#c9a227">&#9824;</text>
  <!-- RINGDOM -->
  <text x="512" y="652" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="132" font-weight="800" fill="#c9a227" letter-spacing="8">RING</text>
  <text x="512" y="774" text-anchor="middle" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="132" font-weight="800" fill="#c9a227" letter-spacing="8">DOM</text>
</svg>
